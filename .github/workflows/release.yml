name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Frontend checks
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test

  build:
    name: Build ${{ matrix.label }}
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: msi,nsis
            artifact: axiom-windows-x64
            platform: windows-x86_64
            paths: |
              src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
              src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe*
          - label: Linux x64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: deb,appimage,rpm
            artifact: axiom-linux-x64
            platform: linux-x86_64
            paths: |
              src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
              src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage*
              src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/rpm/*.rpm
          - label: macOS Intel
            os: macos-15-intel
            target: x86_64-apple-darwin
            bundles: dmg
            artifact: axiom-macos-x64
            platform: darwin-x86_64
            paths: |
              src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
              src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app.tar.gz*
          - label: macOS Apple Silicon
            os: macos-15
            target: aarch64-apple-darwin
            bundles: dmg
            artifact: axiom-macos-arm64
            platform: darwin-aarch64
            paths: |
              src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
              src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz*
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            ./src-tauri -> target
          key: ${{ matrix.target }}
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm
      - run: pnpm install --frozen-lockfile
      - name: Build installers and signed updater artifacts
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}
      - name: Build signed macOS updater
        if: runner.os == 'macOS'
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build --target ${{ matrix.target }} --bundles app
      - name: Smoke-test Linux packages
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          bundle="src-tauri/target/${{ matrix.target }}/release/bundle"
          appimage="$(find "$bundle/appimage" -maxdepth 1 -type f -name '*.AppImage' -print -quit)"
          deb="$(find "$bundle/deb" -maxdepth 1 -type f -name '*.deb' -print -quit)"
          rpm_file="$(find "$bundle/rpm" -maxdepth 1 -type f -name '*.rpm' -print -quit)"
          test -n "$appimage" && test -n "$deb" && test -n "$rpm_file"
          chmod +x "$appimage"
          temp_dir="$(mktemp -d)"
          trap 'rm -rf "$temp_dir"' EXIT
          (cd "$temp_dir" && "$GITHUB_WORKSPACE/$appimage" --appimage-extract >/dev/null)
          test -x "$temp_dir/squashfs-root/AppRun"
          dpkg-deb --info "$deb" >/dev/null
          dpkg-deb --contents "$deb" > "$temp_dir/deb-contents.txt"
          grep -q '/usr/bin/axiom' "$temp_dir/deb-contents.txt"
          rpm -qip "$rpm_file" >/dev/null
          rpm -qlp "$rpm_file" > "$temp_dir/rpm-contents.txt"
          grep -q '/usr/bin/axiom' "$temp_dir/rpm-contents.txt"
      - name: Upload installers and updater artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}-${{ matrix.platform }}-${{ github.ref_name }}
          if-no-files-found: error
          retention-days: 14
          path: ${{ matrix.paths }}

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
      - name: Collect and rename release files
        shell: bash
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p release-files
          : > updater-map.txt
          for dir in release-artifacts/*; do
            name="$(basename "$dir")"
            case "$name" in
              *windows-x86_64*) platform="windows-x86_64"; updater_glob="*.exe"; updater_suffix="exe" ;;
              *linux-x86_64*) platform="linux-x86_64"; updater_glob="*.AppImage"; updater_suffix="AppImage" ;;
              *darwin-x86_64*) platform="darwin-x86_64"; updater_glob="*.app.tar.gz"; updater_suffix="app.tar.gz" ;;
              *darwin-aarch64*) platform="darwin-aarch64"; updater_glob="*.app.tar.gz"; updater_suffix="app.tar.gz" ;;
              *) echo "Unknown artifact directory: $name" >&2; exit 1 ;;
            esac
            while IFS= read -r -d '' file; do
              base="$(basename "$file")"
              case "$base" in
                *.msi) suffix="msi" ;;
                *.exe) suffix="exe" ;;
                *.deb) suffix="deb" ;;
                *.rpm) suffix="rpm" ;;
                *.AppImage) suffix="AppImage" ;;
                *.dmg) suffix="dmg" ;;
                *) continue ;;
              esac
              cp "$file" "release-files/Axiom-${TAG}-${platform}.${suffix}"
            done < <(find "$dir" -type f -print0)
            updater="$(find "$dir" -type f -name "$updater_glob" -print -quit)"
            if [[ -z "$updater" || ! -f "${updater}.sig" ]]; then
              echo "Missing signed updater artifact for $platform" >&2
              exit 1
            fi
            updater_name="Axiom-${TAG}-${platform}.${updater_suffix}"
            cp "$updater" "release-files/$updater_name"
            cp "${updater}.sig" "release-files/${updater_name}.sig"
            printf '%s|%s|%s\n' "$platform" "$updater_name" "${updater_name}.sig" >> updater-map.txt
          done
      - name: Generate updater metadata
        shell: python
        env:
          REPOSITORY: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          import datetime, json, os, pathlib
          root = pathlib.Path("release-files")
          tag = os.environ["TAG"]
          repository = os.environ["REPOSITORY"]
          direct_platforms = {}
          mirror_platforms = {}
          for line in pathlib.Path("updater-map.txt").read_text(encoding="utf-8").splitlines():
              platform, archive, signature = line.split("|", 2)
              direct_url = f"https://github.com/{repository}/releases/download/{tag}/{archive}"
              signature_text = (root / signature).read_text(encoding="utf-8").strip()
              direct_platforms[platform] = {"signature": signature_text, "url": direct_url}
              mirror_platforms[platform] = {
                  "signature": signature_text,
                  "url": f"https://gh-proxy.com/{direct_url}",
              }
          expected = {"windows-x86_64", "linux-x86_64", "darwin-x86_64", "darwin-aarch64"}
          if set(direct_platforms) != expected:
              raise SystemExit(f"Updater platform mismatch: {set(direct_platforms)}")
          common = {
              "version": tag.removeprefix("v"),
              "notes": "Improves Plan mode and per-task run settings; adds tray controls, mirrored updates, default maximization, and KDE Wayland AppImage compatibility.",
              "pub_date": datetime.datetime.now(datetime.timezone.utc).isoformat().replace("+00:00", "Z"),
          }
          mirror_payload = {**common, "platforms": mirror_platforms}
          direct_payload = {**common, "platforms": direct_platforms}
          (root / "latest.json").write_text(json.dumps(mirror_payload, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          (root / "latest-direct.json").write_text(json.dumps(direct_payload, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
      - name: Validate updater metadata
        shell: python
        run: |
          import json, pathlib
          root = pathlib.Path("release-files")
          mirror = json.loads((root / "latest.json").read_text(encoding="utf-8"))
          direct = json.loads((root / "latest-direct.json").read_text(encoding="utf-8"))
          if mirror["version"] != direct["version"] or set(mirror["platforms"]) != set(direct["platforms"]):
              raise SystemExit("Updater metadata files disagree")
          for platform in direct["platforms"]:
              mirrored = mirror["platforms"][platform]
              original = direct["platforms"][platform]
              if not mirrored["url"].startswith("https://gh-proxy.com/https://github.com/"):
                  raise SystemExit(f"Invalid mirror URL for {platform}")
              if not original["url"].startswith("https://github.com/"):
                  raise SystemExit(f"Invalid direct URL for {platform}")
              if mirrored["signature"] != original["signature"]:
                  raise SystemExit(f"Signature mismatch for {platform}")
      - name: Generate SHA-256 checksums
        working-directory: release-files
        run: find . -maxdepth 1 -type f ! -name SHA256SUMS.txt -printf '%f\0' | sort -z | xargs -0 sha256sum > SHA256SUMS.txt
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Axiom ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          overwrite_files: true
          files: release-files/*
