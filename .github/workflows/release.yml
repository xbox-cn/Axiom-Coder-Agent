name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Frontend checks
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  build:
    name: Build ${{ matrix.label }}
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: msi,nsis
            artifact: axiom-windows-x64
            paths: |
              src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
              src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          - label: Linux x64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: deb,appimage,rpm
            artifact: axiom-linux-x64
            paths: |
              src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
              src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
              src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/rpm/*.rpm
          - label: macOS Intel
            os: macos-15-intel
            target: x86_64-apple-darwin
            bundles: dmg
            artifact: axiom-macos-x64
            paths: |
              src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
          - label: macOS Apple Silicon
            os: macos-15
            target: aarch64-apple-darwin
            bundles: dmg
            artifact: axiom-macos-arm64
            paths: |
              src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            ./src-tauri -> target
          key: ${{ matrix.target }}
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm
      - run: pnpm install --frozen-lockfile
      - name: Build installers
        run: pnpm tauri build --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}
      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}-${{ github.ref_name }}
          if-no-files-found: error
          retention-days: 14
          path: ${{ matrix.paths }}

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Download installers
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true
      - name: Collect installers
        shell: bash
        run: |
          mkdir -p release-files
          while IFS= read -r -d '' file; do
            name="$(basename "$file")"
            if [[ -e "release-files/$name" ]]; then
              echo "Duplicate release asset name: $name" >&2
              exit 1
            fi
            cp "$file" "release-files/$name"
          done < <(find release-artifacts -type f -print0)
      - name: Generate SHA-256 checksums
        working-directory: release-files
        run: find . -maxdepth 1 -type f ! -name SHA256SUMS.txt -printf '%f\0' | sort -z | xargs -0 sha256sum > SHA256SUMS.txt
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Axiom ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          overwrite_files: true
          files: release-files/*
